{% set name = "dataproperty" %}
{% set version = "1.1.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/dataproperty-{{ version }}.tar.gz
  sha256: a83af82a234edda5378a36fb092bc90dd554646c5e58202a310acf468ae81bc8

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=64
    - setuptools-scm >=8
    - releasecmd
    - pip
  run:
    - python >={{ python_min }}
    - mbstrdecoder >=1.0.0,<2
    - setuptools >=64
    - typepy >=1.3.2,<3

test:
  imports:
    - dataproperty
    - dataproperty.logger
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/thombashi/DataProperty
  summary: Python library for extract property from data.
  dev_url: https://github.com/thombashi/DataProperty
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - basnijholt
